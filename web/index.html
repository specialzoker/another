<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 지원경향 분석</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="locked">
<div id="gate">
  <div class="gateCard">
    <div id="resetView" class="hidden">
      <div class="gateLogo">진협</div>
      <div class="gateTitle">비밀번호 재설정</div>
      <div class="gateSub">새 비밀번호를 입력하세요</div>
      <div class="gateField"><input type="password" id="newPw" placeholder="새 비밀번호 (6자 이상)" onkeydown="if(event.key==='Enter')Auth.doResetPw()"></div>
      <div class="gateField"><input type="password" id="newPw2" placeholder="비밀번호 확인" onkeydown="if(event.key==='Enter')Auth.doResetPw()"></div>
      <button class="gateBtn" onclick="Auth.doResetPw()">비밀번호 변경</button>
      <div class="gateErr" id="resetErr"></div>
    </div>
    <div id="loginView">
      <div class="gateLogo">진협</div>
      <div class="gateTitle">2026 지원경향 분석</div>
      <div class="gateSub" id="gateSub">학교 고유 키를 입력하세요</div>
      <div id="keyWrap">
        <div class="gateField">
          <input type="password" id="keyInput" placeholder="학교 고유 키 입력" onkeydown="if(event.key==='Enter')Auth.doLogin()">
          <button type="button" class="gateToggle" onclick="Auth.togglePw()">표시</button>
        </div>
      </div>
      <div id="adminWrap" class="hidden">
        <div class="gateField"><input type="email" id="adminEmail" placeholder="관리자 이메일" onkeydown="if(event.key==='Enter')Auth.doAdminLogin()"></div>
        <div class="gateField"><input type="password" id="adminPw" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')Auth.doAdminLogin()"></div>
      </div>
      <button class="gateBtn" id="gateBtn" onclick="Auth.doLogin()">확인</button>
      <div class="gateErr" id="gateErr"></div>
      <div class="gateStatus" id="gateStatus"></div>
      <div style="margin-top:12px"><button onclick="Auth.toggleAdminMode()" id="adminToggle" class="gateLink">관리자 로그인</button></div>
    </div>
  </div>
</div>
<header>
  <div class="brandbar">
    <div class="brandText">
      <h1>2026 지원경향 분석</h1>
      <p>작년 교차지원 · 합격 경향 조회</p>
    </div>
    <div class="headerRight">
      <div class="topBadge" id="reportBadge">로딩…</div>
      <div class="credit">제작 · 광명북고 진로진학부장 정현석</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="schoolTag"></span>
        <button class="logoutBtn" onclick="Auth.logout()">로그아웃</button>
      </div>
    </div>
  </div>
</header>
<main>
  <div class="tabs" id="sheetTabs"></div>
  <div class="card" id="searchCard">
    <div class="form-grid-2">
      <div>
        <label for="q">검색 (대학·전형·학과)</label>
        <input id="q" type="search" placeholder="예: 서울대 지역균형">
      </div>
      <div>
        <label for="regionFilter">지역</label>
        <select id="regionFilter"><option value="">전체</option></select>
      </div>
    </div>
    <div class="scroll" style="max-height:340px;margin-top:12px">
      <table>
        <thead><tr><th style="width:70px">지역</th><th style="width:140px">대학</th><th>전형 · 학과</th></tr></thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>
  <div id="detail"></div>
</main>
<script src="data/index.js"></script>
<script src="render.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
</body>
</html>
